project:
  type: website
  output-dir: _site
  render:
    - "index.qmd"
    - "references.qmd"
    - "references/*.qmd"
    - "experiments.qmd"
    - "experiments/**/*.qmd"
    - "agents/*.qmd"
  resources:
    - "images/**"
    - "videos/**"

website:
  title: "QuadruJuggle"
  description: "Live research log built by c3r agents"
  navbar:
    background: dark
    search: true
    left:
      - href: index.qmd
        text: Overview
      # AGENT_MENU_BEGIN (auto-regenerated by `c3r report publish` from state.json)
      - href: agents/index.qmd
        text: Agents
        menu:
          - href: agents/index.qmd
            text: All agents
          - href: agents/perception.qmd
            text: perception
          - href: agents/policy.qmd
            text: policy
          - href: agents/testing-dashboard.qmd
            text: testing-dashboard
      # AGENT_MENU_END
      - href: experiments.qmd
        text: Experiments
      - href: references.qmd
        text: References
    right:
      - icon: github
        href: "https://github.com/DJRGVC/QuadruJuggle"
        aria-label: GitHub repo

  page-footer:
    left: "Generated by [c3r](https://github.com/DJRGVC/c3r) · agent-maintained"
    right: "Powered by [Quarto](https://quarto.org)"

format:
  html:
    theme:
      light: cosmo
      dark: darkly
    css: styles.css
    toc: true
    toc-depth: 3
    code-fold: false
    code-tools: true
    code-copy: true
    fig-cap-location: bottom
    tbl-cap-location: top
    smooth-scroll: true
    anchor-sections: true
    highlight-style: github
    link-external-icon: true
    link-external-newwindow: true
